      function Settings2Icon({ size = 18, className = '' }) {
        return (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M20 7h-9" /><path d="M14 17H5" />

      // ==========================================
      // 3. Mathematical Algebra Utilities
      // ==========================================
      function gcd(a, b) {
        return b === 0 ? Math.abs(a) : gcd(b, a % b);
      }

      function simplifyRational(n, d) {
        if (d === 0) return { n, d: 1 };
        if (d < 0) { n = -n; d = -d; }
        const common = gcd(n, d);
        return { n: n / common, d: d / common };
      }

      function formatRational(n, d) {
        const { n: sn, d: sd } = simplifyRational(n, d);
        if (sd === 1) return sn.toString();
        if (sn < 0) {
          return `-\\frac{${Math.abs(sn)}}{${sd}}`;
        }
        return `\\frac{${sn}}{${sd}}`;
      }

      function generateSubQuestion(expression, a, b, c) {
        const val = expression.calc();
        const expected = formatRational(val.n, val.d);
        
        const options = new Set();
        options.add(expected);
        
        const distractors = new Set();
        distractors.add(formatRational(-val.n, val.d));
        
        if (expression.text.includes('\\alpha + \\beta')) {
          distractors.add(formatRational(b, a));
          distractors.add(formatRational(-c, a));
          distractors.add(formatRational(c, a));
        } else if (expression.text.includes('\\alpha \\beta') || expression.text.includes('\\alpha\\beta')) {
          distractors.add(formatRational(-c, a));
          distractors.add(formatRational(-b, a));
          distractors.add(formatRational(b, a));
        }

        if (a !== 1) {
          distractors.add((-b).toString());
          distractors.add(c.toString());
        }

        const baseDistractors = Array.from(distractors);
        for (const s of baseDistractors) {
          if (options.size >= 4) break;
          if (s !== expected) options.add(s);
        }

        let attempts = 0;
        while (options.size < 4 && attempts < 50) {
          attempts++;
          const offset = Math.floor(Math.random() * 6) - 3;
          if (offset === 0) continue;
          const dStr = formatRational(val.n + offset * val.d, val.d);
          if (dStr !== expected) options.add(dStr);
        }

        return {
          expression: expression.text,
          expectedAnswer: expected,
          options: Array.from(options).sort(() => Math.random() - 0.5)
        };
      }

      function generateSubQuestionCubic(expression, a, b, c, d) {
        const val = expression.calc();
        const expected = formatRational(val.n, val.d);
        
        const options = new Set();
        options.add(expected);
        
        const distractors = new Set();
        distractors.add(formatRational(-val.n, val.d));
        
        if (expression.text === '\\alpha + \\beta + \\gamma') {
          distractors.add(formatRational(b, a));
          distractors.add(formatRational(-c, a));
          distractors.add(formatRational(c, a));
        } else if (expression.text === '\\alpha\\beta + \\beta\\gamma + \\gamma\\alpha') {
          distractors.add(formatRational(-c, a));
          distractors.add(formatRational(-b, a));
          distractors.add(formatRational(b, a));
        } else if (expression.text === '\\alpha\\beta\\gamma') {
          distractors.add(formatRational(d, a));
          distractors.add(formatRational(-c, a));
          distractors.add(formatRational(c, a));
        }

        if (a !== 1) {
          distractors.add((-b).toString());
          distractors.add(c.toString());
          distractors.add(d.toString());
        }

        const baseDistractors = Array.from(distractors);
        for (const s of baseDistractors) {
          if (options.size >= 4) break;
          if (s !== expected) options.add(s);
        }

        let attempts = 0;
        while (options.size < 4 && attempts < 50) {
          attempts++;
          const offset = Math.floor(Math.random() * 6) - 3;
          if (offset === 0) continue;
          const dStr = formatRational(val.n + offset * val.d, val.d);
          if (dStr !== expected) options.add(dStr);
        }

        return {
          expression: expression.text,
          expectedAnswer: expected,
          options: Array.from(options).sort(() => Math.random() - 0.5)
        };
      }

      function generateQuestionsSet(type, difficulty) {
        if (difficulty === Difficulty.BASIC) {
          return Array.from({ length: 10 }, () => generateQuestion(type, difficulty));
        } else {
          const id = Math.random().toString(36).substring(7);
          const a = 1;
          const allowed = [-4, -3, -2, -1, 1, 2, 3, 4];
          const b = allowed[Math.floor(Math.random() * allowed.length)];
          const c = allowed[Math.floor(Math.random() * allowed.length)];

          const expressions = [
            { text: '\\alpha + \\beta', calc: () => ({ n: -b, d: a }) },
            { text: '\\alpha \\beta', calc: () => ({ n: c, d: a }) },
            { text: '\\alpha^2 + \\beta^2', calc: () => ({ n: b * b - 2 * a * c, d: a * a }) },
            { text: '\\frac{1}{\\alpha} + \\frac{1}{\\beta}', calc: () => ({ n: -b, d: c }) },
            { text: '(\\alpha - \\beta)^2', calc: () => ({ n: b * b - 4 * a * c, d: a * a }) },
            { text: '\\alpha^2\\beta + \\alpha\\beta^2', calc: () => ({ n: -b * c, d: a * a }) },
            { text: '(\\alpha + 1)(\\beta + 1)', calc: () => ({ n: a - b + c, d: a }) },
            { text: '\\alpha^3 + \\beta^3', calc: () => ({ n: -b * (b * b - 3 * a * c), d: a * a * a }) },
            { text: '\\frac{\\beta}{\\alpha} + \\frac{\\alpha}{\\beta}', calc: () => ({ n: b * b - 2 * a * c, d: a * c }) },
            { text: '\\alpha^2\\beta^2', calc: () => ({ n: c * c, d: a * a }) },
          ];

          const basicExprs = [expressions[0], expressions[1]];
          const advExprs = expressions.slice(2).sort(() => Math.random() - 0.5);
          const finalExpressions = [...basicExprs, ...advExprs];

          return finalExpressions.map((expr, index) => {
            const subQ = generateSubQuestion(expr, a, b, c);
            return {
              id: `${id}_${index}`,
              type: EquationType.QUADRATIC,
              difficulty,
              equationType: 'standard',
              a,
              b,
              c,
              subQuestions: [subQ],
              explanationTemplate: `2次方程式 ${a === 1 ? '' : a}x^2 ${b >= 0 ? '+' : ''}${b}x ${c >= 0 ? '+' : ''}${c} = 0$ において、解と係数の関係より、\n$\\alpha + \\beta = -\\frac{b}{a}$, $\\alpha\\beta = \\frac{c}{a}$ です。`
            };
          });
        }
      }

      function generateQuestion(type, difficulty) {
        const id = Math.random().toString(36).substring(7);
        
        if (type === EquationType.CUBIC) {
          let a = 1;
          let b = Math.floor(Math.random() * 11) - 5;
          let c = Math.floor(Math.random() * 11) - 5;
          let d = Math.floor(Math.random() * 11) - 5;
          if (b === 0 && c === 0 && d === 0) d = 3;

          const baseExpressions = [
            { text: '\\alpha + \\beta + \\gamma', calc: () => ({ n: -b, d: a }) },
            { text: '\\alpha\\beta + \\beta\\gamma + \\gamma\\alpha', calc: () => ({ n: c, d: a }) },
            { text: '\\alpha\\beta\\gamma', calc: () => ({ n: -d, d: a }) },
          ];

          const subQuestions = [];
          subQuestions.push(generateSubQuestionCubic(baseExpressions[0], a, b, c, d));
          subQuestions.push(generateSubQuestionCubic(baseExpressions[1], a, b, c, d));
          subQuestions.push(generateSubQuestionCubic(baseExpressions[2], a, b, c, d));

          return {
            id,
            type: EquationType.CUBIC,
            difficulty: Difficulty.BASIC,
            equationType: 'standard',
            a,
            b,
            c,
            d,
            subQuestions,
            explanationTemplate: `3次方程式 ${a === 1 ? '' : a}x^3 ${b >= 0 ? '+' : ''}${b}x^2 ${c >= 0 ? '+' : ''}${c}x ${d >= 0 ? '+' : ''}${d} = 0$ において、解と係数の関係より、\n$\\alpha + \\beta + \\gamma = -\\frac{b}{a}$, $\\alpha\\beta + \\beta\\gamma + \\gamma\\alpha = \\frac{c}{a}$, $\\alpha\\beta\\gamma = -\\frac{d}{a}$ です。`
          };
        }

        let a = 1;
        let b = 0;
        let c = 0;

        if (difficulty === Difficulty.BASIC) {
          const isAEqualToOne = Math.random() < 0.5;
          if (isAEqualToOne) {
            a = 1;
            b = Math.floor(Math.random() * 12) - 6;
            c = Math.floor(Math.random() * 12) - 6;
            if (b === 0 && c === 0) c = 4;
          } else {
            a = [2, 3, 5][Math.floor(Math.random() * 3)];
            b = Math.floor(Math.random() * 12) - 6;
            c = Math.floor(Math.random() * 12) - 6;
            if (b === 0 && c === 0) c = 3;
          }
        } else {
          a = 1;
          const allowed = [-4, -3, -2, -1, 1, 2, 3, 4];
          b = allowed[Math.floor(Math.random() * allowed.length)];
          c = allowed[Math.floor(Math.random() * allowed.length)];
        }

        const subQuestions = [];

        if (difficulty === Difficulty.BASIC) {
          const baseExpressions = [
            { text: '\\alpha + \\beta \\text{（和）}', calc: () => ({ n: -b, d: a }) },
            { text: '\\alpha \\beta \\text{（積）}', calc: () => ({ n: c, d: a }) },
          ];
          subQuestions.push(generateSubQuestion(baseExpressions[0], a, b, c));
          subQuestions.push(generateSubQuestion(baseExpressions[1], a, b, c));
        } else {
          const advancedExpressions = [
            { text: '\\alpha^2 + \\beta^2', calc: () => ({ n: b * b - 2 * a * c, d: a * a }) },
            { text: '\\frac{1}{\\alpha} + \\frac{1}{\\beta}', calc: () => ({ n: -b, d: c }) },
            { text: '(\\alpha - \\beta)^2', calc: () => ({ n: b * b - 4 * a * c, d: a * a }) },
            { text: '\\alpha^2\\beta + \\alpha\\beta^2', calc: () => ({ n: -b * c, d: a * a }) },
            { text: '(\\alpha + 1)(\\beta + 1)', calc: () => ({ n: a - b + c, d: a }) },
            { text: '\\alpha^3 + \\beta^3', calc: () => ({ n: -b * (b * b - 3 * a * c), d: a * a * a }) },
            { text: '\\frac{\\beta}{\\alpha} + \\frac{\\alpha}{\\beta}', calc: () => ({ n: b * b - 2 * a * c, d: a * c }) },
            { text: '\\alpha^2\\beta^2', calc: () => ({ n: c * c, d: a * a }) }
          ];

          let available = advancedExpressions;
          if (c === 0) {
            available = advancedExpressions.filter(e => !e.text.includes('\\alpha\\beta') && !e.text.includes('\\frac{1}') && !e.text.includes('\\frac{\\beta}'));
          }

          const shuffled = [...available].sort(() => Math.random() - 0.5);
          subQuestions.push(generateSubQuestion(shuffled[0], a, b, c));
          subQuestions.push(generateSubQuestion(shuffled[1], a, b, c));
        }

        return {
          id,
          type: EquationType.QUADRATIC,
          difficulty,
          equationType: 'standard',
          a,
          b,
          c,
          subQuestions,
          explanationTemplate: `2次方程式 ${a === 1 ? '' : a}x^2 ${b >= 0 ? '+' : ''}${b}x ${c >= 0 ? '+' : ''}${c} = 0$ において、解と係数の関係より、\n$\\alpha + \\beta = -\\frac{b}{a}$, $\\alpha\\beta = \\frac{c}{a}$ です。`
        };
      }

      function formatEquationText(q) {
        if (q.type === EquationType.QUADRATIC) {
          let aStr = q.a === 1 ? 'x^2' : q.a === -1 ? '-x^2' : `${q.a}x^2`;
          let bStr = '';
          if (q.b !== 0) {
            bStr = q.b > 0 ? ` + ${q.b === 1 ? '' : q.b}x` : ` - ${Math.abs(q.b) === 1 ? '' : Math.abs(q.b)}x`;
          }
          let cStr = '';
          if (q.c !== 0) {
            cStr = q.c > 0 ? ` + ${q.c}` : ` - ${Math.abs(q.c)}`;
          }
          return `${aStr}${bStr}${cStr} = 0`.replace(/\s+/g, ' ').trim();
        } else {
          let aStr = q.a === 1 ? 'x^3' : q.a === -1 ? '-x^3' : `${q.a}x^3`;
          let bStr = '';
          if (q.b !== 0) {
            bStr = q.b > 0 ? ` + ${q.b === 1 ? '' : q.b}x^2` : ` - ${Math.abs(q.b) === 1 ? '' : Math.abs(q.b)}x^2`;
          }
          let cStr = '';
          if (q.c !== 0) {
            cStr = q.c > 0 ? ` + ${q.c === 1 ? '' : q.c}x` : ` - ${Math.abs(q.c) === 1 ? '' : Math.abs(q.c)}x`;
          }
          let dStr = '';
          if (q.d !== undefined && q.d !== 0) {
            dStr = q.d > 0 ? ` + ${q.d}` : ` - ${Math.abs(q.d)}`;
          }
          return `${aStr}${bStr}${cStr}${dStr} = 0`.replace(/\s+/g, ' ').trim();
        }
      }

      function getStaticExplanation(question, stepIndex) {
        const { a, b, c, d, type } = question;
        const subQ = question.subQuestions[stepIndex];
        const expr = subQ.expression;
        const expectedText = subQ.expectedAnswer;
        const eqStr = formatEquationText(question);

        if (type === EquationType.CUBIC) {
          let formulaPart = '';
          let valPart = '';
          
          if (expr === '\\alpha + \\beta + \\gamma') {
            formulaPart = '\\alpha + \\beta + \\gamma = -\\frac{b}{a}';
            valPart = `-\\frac{${b}}{${a}} = ${formatRational(-b, a)}`;
          } else if (expr === '\\alpha\\beta + \\beta\\gamma + \\gamma\\alpha') {
            formulaPart = '\\alpha\\beta + \\beta\\gamma + \\gamma\\alpha = \\frac{c}{a}';
            valPart = `\\frac{${c}}{${a}} = ${formatRational(c, a)}`;
          } else if (expr === '\\alpha\\beta\\gamma') {
            formulaPart = '\\alpha\\beta\\gamma = -\\frac{d}{a}';
            const dVal = d ?? 0;
            valPart = `-\\frac{${dVal}}{${a}} = ${formatRational(-dVal, a)}`;
          }

          return `3次方程式 $${eqStr}$ において、解と係数の関係の公式より：\n` +
            `- $\\alpha + \\beta + \\gamma = -\\frac{b}{a}$\n` +
            `- $\\alpha\\beta + \\beta\\gamma + \\gamma\\alpha = \\frac{c}{a}$\n` +
            `- $\\alpha\\beta\\gamma = -\\frac{d}{a}$\n\n` +
            `したがって、\n` +
            `$$${formulaPart} = ${valPart}$$`;
        }

        const sumVal = formatRational(-b, a);
        const prodVal = formatRational(c, a);

        const baseRel = `2次方程式 $${eqStr}$ において、解と係数の関係より：\n` +
          `- $\\alpha + \\beta = ${sumVal}$\n` +
          `- $\\alpha\\beta = ${prodVal}$\n\n`;

        let stepExp = '';

        if (expr.includes('\\alpha + \\beta') || expr === '\\alpha + \\beta') {
          stepExp = `求めるものは**和**：\n` +
            `$$\\alpha + \\beta = -\\frac{b}{a} = -\\frac{${b}}{${a}} = ${sumVal}$$`;
        } else if (expr.includes('\\alpha \\beta') || expr.includes('\\alpha\\beta') || expr === '\\alpha \\beta' || expr === '\\alpha\\beta') {
          stepExp = `求めるものは**積**：\n` +
            `$$\\alpha\\beta = \\frac{c}{a} = \\frac{${c}}{${a}} = ${prodVal}$$`;
        } else if (expr === '\\alpha^2 + \\beta^2') {
          stepExp = `対称式の変形公式：\n` +
            `$$\\alpha^2 + \\beta^2 = (\\alpha + \\beta)^2 - 2\\alpha\\beta$$\n\n` +
            `値を代入して計算すると：\n` +
            `$$\\left(${sumVal}\\right)^2 - 2\\left(${prodVal}\\right) = ${expectedText}$$`;
        } else if (expr === '\\frac{1}{\\alpha} + \\frac{1}{\\beta}') {
          stepExp = `対称式の変形公式（通分します）：\n` +
            `$$\\frac{1}{\\alpha} + \\frac{1}{\\beta} = \\frac{\\alpha + \\beta}{\\alpha\\beta}$$\n\n` +
            `値を代入して計算すると：\n` +
            `$$\\frac{${sumVal}}{${prodVal}} = ${expectedText}$$`;
        } else if (expr === '(\\alpha - \\beta)^2') {
          stepExp = `対称式の変形公式：\n` +
            `$$(\\alpha - \\beta)^2 = (\\alpha + \\beta)^2 - 4\\alpha\\beta$$\n\n` +
            `値を代入して計算すると：\n` +
            `$$\\left(${sumVal}\\right)^2 - 4\\left(${prodVal}\\right) = ${expectedText}$$`;
        } else if (expr === '\\alpha^2\\beta + \\alpha\\beta^2') {
          stepExp = `対称式の変形公式（因数分解します）：\n` +
            `$$\\alpha^2\\beta + \\alpha\\beta^2 = \\alpha\\beta(\\alpha + \\beta)$$\n\n` +
            `値を代入して計算すると：\n` +
            `$$\\left(${prodVal}\\right)\\left(${sumVal}\\right) = ${expectedText}$$`;
        } else if (expr === '(\\alpha + 1)(\\beta + 1)') {
          stepExp = `式の展開公式：\n` +
            `$$(\\alpha + 1)(\\beta + 1) = \\alpha\\beta + (\\alpha + \\beta) + 1$$\n\n` +
            `値を代入して計算すると：\n` +
            `$$\\left(${prodVal}\\right) + \\left(${sumVal}\\right) + 1 = ${expectedText}$$`;
        } else if (expr === '\\alpha^3 + \\beta^3') {
          stepExp = `対称式の変形公式：\n` +
            `$$\\alpha^3 + \\beta^3 = (\\alpha + \\beta)^3 - 3\\alpha\\beta(\\alpha + \\beta)$$\n\n` +
            `値を代入して計算すると：\n` +
            `$$\\left(${sumVal}\\right)^3 - 3\\left(${prodVal}\\right)\\left(${sumVal}\\right) = ${expectedText}$$`;
        } else if (expr === '\\frac{\\beta}{\\alpha} + \\frac{\\alpha}{\\beta}') {
          stepExp = `対称式の変形公式（通分して変形します）：\n` +
            `$$\\frac{\\beta}{\\alpha} + \\frac{\\alpha}{\\beta} = \\frac{\\alpha^2 + \\beta^2}{\\alpha\\beta} = \\frac{(\\alpha + \\beta)^2 - 2\\alpha\\beta}{\\alpha\\beta}$$\n\n` +
            `値を代入して計算すると：\n` +
            `$$\\frac{\\left(${sumVal}\\right)^2 - 2\\left(${prodVal}\\right)}{${prodVal}} = ${expectedText}$$`;
        } else if (expr === '\\alpha^2\\beta^2') {
          stepExp = `対称式の変形公式：\n` +
            `$$\\alpha^2\\beta^2 = (\\alpha\\beta)^2$$\n\n` +
            `値を代入して計算すると：\n` +
            `$$\\left(${prodVal}\\right)^2 = ${expectedText}$$`;
        }

        return baseRel + stepExp;
      }


      // ==========================================
      // 4. Mathematical Rendering Components
      // ==========================================
      function MathView({ math, block = false, className = '' }) {
        const containerRef = useRef(null);

        useEffect(() => {
          if (containerRef.current) {
            try {
              katex.render(math, containerRef.current, {
                throwOnError: false,
                displayMode: block,
              });
            } catch (e) {
              containerRef.current.textContent = math;
            }
          }
        }, [math, block]);

        return <span ref={containerRef} className={className} />;
      }

      function MathMarkdown({ text }) {
        if (!text) return null;

        // Tokenize into LaTeX expressions and text blocks to render each element safely
        const regex = /(\$\$[^\$]+\$\$|\$[^\$]+\$)/g;
        const parts = text.split(regex);

        return (
          <div className="space-y-1.5 text-gray-700 text-xs sm:text-sm">
            {parts.map((part, index) => {
              if (part.startsWith('$$') && part.endsWith('$$')) {
                const math = part.slice(2, -2);
                return (
                  <div key={index} className="my-2 py-2 overflow-x-auto bg-gray-50/50 rounded border border-gray-100 flex justify-center">
                    <MathView math={math} block={true} />
                  </div>
                );
              } else if (part.startsWith('$') && part.endsWith('$')) {
                const math = part.slice(1, -1);
                return <MathView key={index} math={math} block={false} />;
              } else {
                const lines = part.split('\n');
                return (
                  <div key={index} className="inline">
                    {lines.map((line, lIdx) => {
                      const trimmed = line.trim();
                      if (trimmed.startsWith('- ')) {
                        return (
                          <li key={lIdx} className="ml-4 list-disc my-0.5 text-[#4A5568]">
                            {trimmed.substring(2)}
                          </li>
                        );
                      }
                      return (
                        <React.Fragment key={lIdx}>
                          {line}
                          {lIdx < lines.length - 1 && <br />}
                        </React.Fragment>
                      );
                    })}
                  </div>
                );
              }
            })}
          </div>
        );
      }


      // ==========================================

      function App() {

        const [currentStep, setCurrentStep] = useState(0);
        const [userAnswers, setUserAnswers] = useState([]);
        const [feedback, setFeedback] = useState(null);
        const [drillScore, setDrillScore] = useState(0);
        const [judgment, setJudgment] = useState(null);
        const [history, setHistory] = useState(Array(10).fill(null));
        const autoAdvanceTimeoutRef = useRef(null);

        useEffect(() => {
          return () => {
            if (autoAdvanceTimeoutRef.current) {
              clearTimeout(autoAdvanceTimeoutRef.current);
            }
          };
        }, []);

        const startDrill = () => {
          if (autoAdvanceTimeoutRef.current) {
            clearTimeout(autoAdvanceTimeoutRef.current);
            autoAdvanceTimeoutRef.current = null;
          }
          const qSet = generateQuestionsSet(EquationType.QUADRATIC, difficulty);
          setQuestionsSet(qSet);
          setCurrentQuestionIndex(0);
          setCurrentStep(0);
          setUserAnswers([]);
          setDrillScore(0);
          setHistory(Array(10).fill(null));
          setFeedback(null);
          setGameState('drill');
        };

        const nextQuestion = () => {
          if (autoAdvanceTimeoutRef.current) {
            clearTimeout(autoAdvanceTimeoutRef.current);
            autoAdvanceTimeoutRef.current = null;
          }
          if (currentQuestionIndex < 9) {
            setCurrentQuestionIndex(prev => prev + 1);
            setCurrentStep(0);
            setUserAnswers([]);
            setFeedback(null);
          } else {
            setGameState('summary');
          }
        };

        const currentQuestion = questionsSet[currentQuestionIndex];

        const checkAnswer = async (selected) => {
          if (!currentQuestion || judgment || feedback) return;
          
          const subQ = currentQuestion.subQuestions[currentStep];
          const isStepCorrect = selected === subQ.expectedAnswer.toString();

          setJudgment(isStepCorrect ? 'correct' : 'incorrect');
          await new Promise(resolve => setTimeout(resolve, 600));
          setJudgment(null);

          if (feedback) return;

          const newAnswers = [...userAnswers, selected];
          setUserAnswers(newAnswers);

          if (isStepCorrect) {
            if (currentStep < currentQuestion.subQuestions.length - 1) {
              setCurrentStep(prev => prev + 1);
            } else {
              const allCorrect = currentQuestion.subQuestions.every((sq, idx) => {
                const ans = idx === currentStep ? selected : userAnswers[idx];
                return ans === sq.expectedAnswer.toString();
              });

              if (allCorrect) {
                setDrillScore(prev => prev + 1);
              }

              setHistory(prev => {
                const nextHist = [...prev];
                nextHist[currentQuestionIndex] = allCorrect;
                return nextHist;
              });

              if (allCorrect) {
                nextQuestion();
              } else {
                const localExplanation = getStaticExplanation(currentQuestion, currentStep);
                setFeedback({ isCorrect: false, explanation: localExplanation });
              }
            }
          } else {
            setHistory(prev => {
              const nextHist = [...prev];
              nextHist[currentQuestionIndex] = false;
              return nextHist;
            });

            const localExplanation = getStaticExplanation(currentQuestion, currentStep);
            setFeedback({ isCorrect: false, explanation: localExplanation });
          }
        };

        const formatEquation = (q) => {
          if (q.type === EquationType.QUADRATIC) {
            let aStr = '';
            if (q.a === 1) aStr = 'x^2';
            else if (q.a === -1) aStr = '-x^2';
            else aStr = `${q.a}x^2`;

            let bStr = '';
            if (q.b !== 0) {
              const sign = q.b > 0 ? '+' : '-';
              const coeff = Math.abs(q.b) === 1 ? '' : Math.abs(q.b).toString();
              bStr = ` ${sign} ${coeff}x`;
            }

            const cStr = q.c === 0 ? '' : ` ${q.c > 0 ? '+' : '-'} ${Math.abs(q.c)}`;
            return `${aStr}${bStr}${cStr} = 0`.replace(/\s+/g, ' ').trim();
          } else {
            let aStr = '';
            if (q.a === 1) aStr = 'x^3';
            else if (q.a === -1) aStr = '-x^3';
            else aStr = `${q.a}x^3`;

            let bStr = '';
            if (q.b !== 0) {
              const sign = q.b > 0 ? '+' : '-';
              const coeff = Math.abs(q.b) === 1 ? '' : Math.abs(q.b).toString();
              bStr = ` ${sign} ${coeff}x^2`;
            }

            let cStr = '';
            if (q.c !== 0) {
              const sign = q.c > 0 ? '+' : '-';
              const coeff = Math.abs(q.c) === 1 ? '' : Math.abs(q.c).toString();
              cStr = ` ${sign} ${coeff}x`;
            }

            const dStr = q.d === 0 ? '' : ` ${q.d > 0 ? '+' : '-'} ${Math.abs(q.d)}`;
            return `${aStr}${bStr}${cStr}${dStr} = 0`.replace(/\s+/g, ' ').trim();
          }
        };

                        <div 
                          key={i} 
                          className={`h-8 sm:h-10 rounded-lg border flex items-center justify-center font-bold text-xs ${h ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'}`}
                        >
                          {i + 1}
                        </div>
                      ))}
                    </div>
                  </div>

                  <button 
                    onClick={() => setGameState('menu')}
                    className="px-6 py-3 sm:px-8 sm:py-4 bg-gray-950 hover:bg-black text-white font-bold rounded-xl sm:rounded-2xl transition-all shadow-lg flex items-center gap-2 group active:scale-95 duration-100"
                  >
                    <span>もう一度トレーニング</span>
                    <RefreshCcwIcon size={16} className="group-hover:rotate-180 transition-transform duration-500" />
                  </button>
                </div>
              )}

              {/* Instant Judgment Huge Overlay */}
              {judgment && (
                <div className="absolute inset-0 flex items-center justify-center z-[100] pointer-events-none animate-scale-up">
                  <div className={`text-[12rem] font-bold select-none ${judgment === 'correct' ? 'text-green-500/80' : 'text-red-500/80'}`}>
                    {judgment === 'correct' ? '〇' : '×'}
                  </div>
                </div>
              )}
            </main>

            {/* Footer */}
            <footer className="py-3 px-6 text-center text-[10px] text-gray-400 bg-white border-t border-gray-100 shrink-0">
               © 2026 Drills • Self-Contained Web App
            </footer>
          </div>
        );
      }

      // Render App
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
